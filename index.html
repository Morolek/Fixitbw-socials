<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixitBw | Your one-stop solution for repairs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar { 
            width: 0px; 
            background: transparent; 
        }
    </style>
</head>
<body class="bg-[#050505] text-neutral-400 antialiased selection:bg-neutral-200 selection:text-black min-h-screen flex flex-col overflow-x-hidden relative">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-96 bg-indigo-900/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
    <div class="fixed bottom-0 right-1/2 translate-x-1/2 w-96 h-96 bg-rose-900/5 blur-[100px] rounded-full pointer-events-none z-0"></div>

    <main class="relative z-10 w-full max-w-md mx-auto min-h-screen flex flex-col items-center justify-center px-6 py-16">
        
        <div class="flex flex-col items-center w-full mb-12 animate-fade-in">
            <!-- Logo Container using the provided logo image -->
            <div class="w-28 h-28 rounded-3xl bg-white border border-white/10 flex items-center justify-center mb-6 shadow-2xl relative overflow-hidden ring-1 ring-white/5 transition-transform duration-500 hover:scale-105">
                <img src="fixit-logo.png" alt="FixitBw Logo" class="w-full h-full object-contain p-3">
            </div>

            <h1 class="text-2xl font-normal tracking-tight text-white mb-2 text-center">
                FixitBw
            </h1>

            <p class="text-base text-neutral-500 font-extralight text-center max-w-xs leading-relaxed">
                Your one-stop solution for repairs.
            </p>
        </div>

        <div class="w-full flex flex-col gap-4">
            
            <!-- TikTok -->
            <a href="https://www.tiktok.com/@fixitbw?lang=en" target="_blank" rel="noopener noreferrer" class="group relative w-full flex items-center p-4 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.04] hover:border-white/20 transition-all duration-500 hover:-translate-y-1 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/0 via-indigo-500/0 to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                
                <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-white/[0.05] border border-white/5 text-neutral-300 group-hover:text-white group-hover:bg-[#00f2fe]/10 group-hover:scale-105 transition-all duration-500 relative z-10">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"></path>
                    </svg>
                </div>
                
                <span class="flex-1 text-center font-normal text-white/90 text-lg tracking-tight relative z-10">
                    TikTok
                </span>
                
                <div class="w-12 flex justify-end text-neutral-600 group-hover:text-white group-hover:translate-x-1 transition-all duration-500 relative z-10">
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </div>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/fixitbw/" target="_blank" rel="noopener noreferrer" class="group relative w-full flex items-center p-4 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.04] hover:border-white/20 transition-all duration-500 hover:-translate-y-1 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-rose-500/0 via-rose-500/0 to-rose-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                
                <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-white/[0.05] border border-white/5 text-neutral-300 group-hover:text-white group-hover:bg-rose-500/10 group-hover:scale-105 transition-all duration-500 relative z-10">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"></path>
                    </svg>
                </div>
                
                <span class="flex-1 text-center font-normal text-white/90 text-lg tracking-tight relative z-10">
                    Instagram
                </span>
                
                <div class="w-12 flex justify-end text-neutral-600 group-hover:text-white group-hover:translate-x-1 transition-all duration-500 relative z-10">
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </div>
            </a>

            <!-- X -->
            <a href="https://x.com/FixitBw" target="_blank" rel="noopener noreferrer" class="group relative w-full flex items-center p-4 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.04] hover:border-white/20 transition-all duration-500 hover:-translate-y-1 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-neutral-500/0 via-neutral-500/0 to-neutral-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                
                <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-white/[0.05] border border-white/5 text-neutral-300 group-hover:text-white group-hover:bg-white/10 group-hover:scale-105 transition-all duration-500 relative z-10">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.15H5.059z"></path>
                    </svg>
                </div>
                
                <span class="flex-1 text-center font-normal text-white/90 text-lg tracking-tight relative z-10">
                    X
                </span>
                
                <div class="w-12 flex justify-end text-neutral-600 group-hover:text-white group-hover:translate-x-1 transition-all duration-500 relative z-10">
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </div>
            </a>

        </div>
        
    </main>

    <script>
        lucide.createIcons({
            attrs: {
                'stroke-width': 1.5
            }
        });
    </script>

</body></html>
